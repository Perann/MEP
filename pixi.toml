[workspace]
authors = ["perann", "adam", "emile"]
channels = ["conda-forge"]
name = "MEP"
platforms = ["linux-64", "osx-arm64",]
version = "0.1.0"

[dependencies]
python = "3.10.*"
numpy = ">=2.2.6,<3"
pandas = ">=2.3.3,<3"
scikit-learn = ">=1.7.2,<2"
ipykernel = ">=7.2.0,<8"
pre-commit = ">=4.5.1,<5"
black = ">=26.3.1,<27"
pillow = ">=12.2.0,<13"
pytest-shutil = ">=1.8.1,<2"
requests = ">=2.33.1,<3"
matplotlib = ">=3.10.8,<4"
mlflow = ">=3.11.1,<4"
python-dotenv = ">=1.2.2,<2"
boto3 = ">=1.42.89,<2"
fastapi = ">=0.136.0,<0.137"
uvicorn = ">=0.44.0,<0.45"

[tasks]
dev = "uvicorn package.price_predictor_api:app --host 0.0.0.0 --port 8000 --reload"
