apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: price-predictor-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
  - hosts:
    - price-api-pnedjar.lab.sspcloud.fr
    secretName: price-predictor-tls
  rules:
  - host: price-api-pnedjar.lab.sspcloud.fr
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: price-predictor-service
            port:
              number: 80