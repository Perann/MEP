apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: price-predictor-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - price-api-pnedjar.lab.sspcloud.fr
    secretName: price-api-tls
  rules:
  - host: price-api-pnedjar.lab.sspcloud.fr
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: price-predictor-service
            port:
              number: 80