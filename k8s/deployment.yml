apiVersion: apps/v1
kind: Deployment
metadata:
  name: price-predictor-api
  labels:
    app: price-predictor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: price-predictor
  template:
    metadata:
      labels:
        app: price-predictor
    spec:
      containers:
      - name: api-container
        image: ghcr.io/perann/price-predictor-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        # Ces valeurs seront remplacées par tes "External Variables" dans Argo CD
        env:
        - name: MLFLOW_TRACKING_URI
          value: "https://mlflow.lab.sspcloud.fr"
        - name: MLFLOW_TRACKING_USERNAME
          value: "user-placeholder"
        - name: MLFLOW_TRACKING_PASSWORD
          value: "pass-placeholder"
        - name: S3_ACCESS_KEY
          value: "key-placeholder"
        - name: S3_SECRET_KEY
          value: "secret-placeholder"
        - name: S3_ENDPOINT
          value: "https://minio.lab.sspcloud.fr"
        
        resources:
          limits:
            cpu: "500m"
            memory: "1Gi"
          requests:
            cpu: "200m"
            memory: "512Mi"
        
        livenessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 60 # On laisse du temps pour le téléchargement du modèle
          periodSeconds: 15

---

apiVersion: v1
kind: Service
metadata:
  name: price-predictor-service
spec:
  selector:
    app: price-predictor
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP

---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: price-predictor-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: price-api-pnedjar.lab.sspcloud.fr
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: price-predictor-service
            port:
              number: 80