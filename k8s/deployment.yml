apiVersion: apps/v1
kind: Deployment
metadata:
  name: price-predictor-api
  labels:
    app: price-predictor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: price-predictor
  template:
    metadata:
      labels:
        app: price-predictor
    spec:
      containers:
      - name: api-container
        image: ghcr.io/perann/price-predictor-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        # Configuration MLFlow
        - name: MLFLOW_TRACKING_URI
          valueFrom:
            secretKeyRef:
              name: mlflow-s3-secrets
              key: MLFLOW_TRACKING_URI
        - name: MLFLOW_TRACKING_USERNAME
          valueFrom:
            secretKeyRef:
              name: mlflow-s3-secrets
              key: MLFLOW_TRACKING_USERNAME
        - name: MLFLOW_TRACKING_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mlflow-s3-secrets
              key: MLFLOW_TRACKING_PASSWORD
        # Configuration S3 / MinIO
        - name: S3_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: mlflow-s3-secrets
              key: S3_ACCESS_KEY
        - name: S3_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: mlflow-s3-secrets
              key: S3_SECRET_KEY
        - name: S3_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: mlflow-s3-secrets
              key: S3_ENDPOINT
        - name: S3_SESSION_TOKEN  # Ajouté car utilisé dans ton code Python
          valueFrom:
            secretKeyRef:
              name: mlflow-s3-secrets
              key: S3_SESSION_TOKEN
        
        resources:
          limits:
            cpu: "500m"
            memory: "1Gi"
          requests:
            cpu: "200m"
            memory: "512Mi"
        
        livenessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 40
          periodSeconds: 15

---

apiVersion: v1
kind: Service
metadata:
  name: price-predictor-service
spec:
  selector:
    app: price-predictor
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP

---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: price-predictor-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: price-api-pnedjar.lab.sspcloud.fr
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: price-predictor-service
            port:
              number: 80